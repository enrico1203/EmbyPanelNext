<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>{{ page }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      overflow-x: hidden;
    }
    /* Sidebar styles */
    #sidebar-wrapper {
      min-height: 100vh;
      margin-left: -15rem;
      transition: margin 0.25s ease-out;
      background: #f8f9fa;
    }
    #sidebar-wrapper .sidebar-heading {
      padding: 0.875rem 1.25rem;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #sidebar-wrapper .list-group {
      width: 15rem;
    }
    /* Page content */
    #page-content-wrapper {
      width: 100%;
    }
    /* Toggle button */
    .menu-toggle {
      cursor: pointer;
    }
    /* Stato toggled della sidebar */
    #sidebar-wrapper.toggled {
      margin-left: 0;
    }
    /* Mobile friendly: rendi la sidebar fissa su dispositivi piccoli */
    @media (max-width: 768px) {
      #sidebar-wrapper {
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        height: 100%;
      }
      #page-content-wrapper {
        width: 100%;
      }
    }
    
  </style>
</head>
<body>
<div class="d-flex" id="wrapper">
  <!-- Sidebar -->
  <div class="bg-light border-right" id="sidebar-wrapper">
    <div class="sidebar-heading">
      Menu
      <!-- Pulsante per chiudere il menù -->
      <button class="btn btn-sm btn-outline-secondary" id="menu-close">&times;</button>
    </div>
    <div class="list-group list-group-flush">
      <a href="{{ url_for('dashboard') }}" class="list-group-item list-group-item-action bg-light">Dashboard</a>
      <a href="{{ url_for('pagina1') }}" class="list-group-item list-group-item-action bg-light">Pagina 1</a>
      <a href="{{ url_for('pagina2') }}" class="list-group-item list-group-item-action bg-light">Pagina 2</a>
      <a href="{{ url_for('logout') }}" class="list-group-item list-group-item-action bg-light">Logout</a>
    </div>
  </div>
  <!-- /#sidebar-wrapper -->

  <!-- Contenuto della pagina -->
  <div id="page-content-wrapper">
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <!-- Bottone per il toggle della sidebar -->
      <button class="btn btn-primary menu-toggle" id="menu-toggle">&#9776;</button>
      <!-- Bottone di collapse della navbar per mobile -->
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" 
              aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
         <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ml-auto mt-2 mt-lg-0">
          <li class="nav-item active">
            <a class="nav-link" href="{{ url_for('dashboard') }}">Home</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container-fluid mt-4">
      <h1>{{ page }}</h1>
      <p>Contenuto di esempio per la pagina "{{ page }}".</p>
    </div>
  </div>
</div>

<!-- Bootstrap JS e jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Toggle della sidebar (apertura/chiusura)
  document.getElementById("menu-toggle").addEventListener("click", function(e) {
    e.preventDefault();
    document.getElementById("sidebar-wrapper").classList.toggle("toggled");
  });
  
  // Pulsante per chiudere il menu
  document.getElementById("menu-close").addEventListener("click", function(e) {
    e.preventDefault();
    document.getElementById("sidebar-wrapper").classList.remove("toggled");
  });
</script>
</body>
</html>
