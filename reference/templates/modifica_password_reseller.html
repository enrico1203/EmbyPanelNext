{% extends "basev5.html" %}
{% block title %}Modifica Password Reseller {{ idtelegram }}{% endblock %}

{% block content %}
<div class="pg">
  <a href="{{ url_for('reseller_detail', idtelegram=idtelegram) }}" class="pg-back">
    <i class="fa-solid fa-arrow-left fa-sm"></i> Torna a Dettagli Reseller
  </a>

  <div class="pg-title">
    Modifica password per: {{ idtelegram }}
  </div>

  <div class="form-card" style="max-width:520px;">
    <form method="post" action="{{ url_for('modifica_password_reseller', idtelegram=idtelegram) }}" autocomplete="off" id="pwdForm">
      <div class="mb-3">
        <label for="password" class="form-label">
          <i class="fa-solid fa-key me-1"></i> Nuova password
        </label>
        <input type="text"
               class="form-control"
               id="password"
               name="password"
               required
               minlength="5"
               pattern="(?=.*[0-9]).{5,}"
               placeholder="Inserisci nuova password"
               value="{{ suggested_password }}">
        <div class="form-text" style="color:var(--txt-muted);">Minimo 5 caratteri e almeno un numero.</div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fa-solid fa-floppy-disk me-1"></i> Salva password
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById("pwdForm").addEventListener("submit", function(e) {
    const field = document.getElementById("password");
    const value = field.value || "";
    const ok = value.length >= 5 && /\d/.test(value);
    if (!ok) {
      e.preventDefault();
      field.classList.add("is-invalid");
    }
  });
</script>
{% endblock %}
