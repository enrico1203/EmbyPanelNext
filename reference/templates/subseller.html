{% extends "basev5.html" %}
{% block title %}Subseller{% endblock %}

{% block content %}
<div class="pg">
  <a href="{{ url_for('lista') }}" class="pg-back">
    <i class="fa-solid fa-arrow-left fa-sm"></i> Torna alla Lista
  </a>

  <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:24px;">
    <div class="pg-title" style="margin-bottom:0;">Subseller</div>
    <a href="{{ url_for('creasubseller') }}" class="btn-submit" style="text-decoration:none; display:inline-flex; align-items:center; gap:6px;">
      <i class="fa-solid fa-plus"></i> Crea Subseller
    </a>
  </div>

  <div style="background:var(--bg-2); border:1px solid var(--border); border-radius:18px; overflow:hidden;">
    <div class="table-responsive">
      {{ table_html | safe }}
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var table = document.querySelector("table");
    if (!table) return;
    table.classList.add("table", "table-dark", "table-striped", "table-hover", "mb-0");
  });
</script>
{% endblock %}
