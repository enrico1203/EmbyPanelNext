{% extends "basev5.html" %}
{% block title %}Utenti Plex di {{ idtelegram }}{% endblock %}

{% block content %}
<div class="pg">
  <a href="{{ url_for('reseller_detail', idtelegram=idtelegram) }}" class="pg-back">
    <i class="fa-solid fa-arrow-left fa-sm"></i> Torna a Dettagli
  </a>

  <div class="pg-title">
    Utenti Plex di {{ idtelegram }}
    <span class="pg-badge" style="background:rgba(245,158,11,0.16); color:#f59e0b; border:1px solid rgba(245,158,11,0.3);">Plex</span>
  </div>

  <div style="background:var(--bg-2); border:1px solid var(--border); border-radius:18px; overflow:hidden;">
    <div class="table-responsive">
      {{ table_html | safe }}
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var table = document.querySelector("table");
    if (!table) return;
    table.classList.add("table", "table-dark", "table-striped", "table-hover", "mb-0");
  });
</script>
{% endblock %}
