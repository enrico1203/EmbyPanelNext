<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <script>(function(){var t=localStorage.getItem('ep-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conferma Cancellazione</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    :root { --bg: #07090e; --bg-2: #111827; --border: rgba(255,255,255,.07); --border-2: rgba(255,255,255,.10); --txt: #e2e8f0; --txt-soft: #94a3b8; --txt-title: #f0f6ff; }
    [data-theme="light"] { --bg: #f0f4f8; --bg-2: #ffffff; --border: rgba(0,0,0,.07); --border-2: rgba(0,0,0,.12); --txt: #1a2235; --txt-soft: #4a5876; --txt-title: #0f172a; }
    body { background: var(--bg); color: var(--txt); }
    .modal-content { background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 14px; }
    .modal-header  { border-color: var(--border); }
    .modal-footer  { border-color: var(--border); }
    .modal-title   { color: var(--txt-title); }
    .modal-body    { color: var(--txt-soft); }
  </style>
</head>
<body>
  <!-- Modale di conferma -->
  <div class="modal fade show" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" style="display:block;" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title" id="confirmModalLabel">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>Conferma Cancellazione
          </h5>
        </div>
        <div class="modal-body">
          <p>Sei sicuro di voler cancellare l'utente <strong>{{ username }}</strong>?<br>
          L'operazione è <strong>definitiva</strong> e il credito <strong>non</strong> viene rimborsato.</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-success" onclick="window.history.back()">Annulla</button>
          <button type="button" class="btn btn-danger" onclick="confirmDelete('{{ username }}')">Elimina</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Funzione per confermare la cancellazione
    function confirmDelete(username) {
      fetch('/jcancella_confirm/' + username)
        .then(response => response.text())
        .then(data => {
          alert(data);
          // Dopo aver cancellato l'utente, reindirizza anche alla lista
          window.location.href = "{{ url_for('listajelly') }}";
        })
        .catch(error => {
          console.error(error);
          alert("Errore durante la cancellazione.");
        });
    }
  </script>
</body>
</html>
