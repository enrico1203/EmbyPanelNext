<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Login – EmbyPanel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #07090e;
      --bg-2:    #111827;
      --bg-3:    #1a2235;
      --border-2:rgba(255,255,255,0.13);
      --gold:    #f5b84b;
      --txt:     #e2e8f0;
      --txt-soft:#94a3b8;
      --txt-muted:#4a5568;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,184,75,0.06) 0%, transparent 70%), var(--bg);
    }

    .login-card {
      width: 100%; max-width: 420px;
      background: var(--bg-2);
      border: 1px solid var(--border-2);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
    }

    .login-logo {
      width: 48px; height: 48px;
      background: var(--gold);
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      color: #000;
      margin: 0 auto 20px;
    }

    .login-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: -.02em;
      color: #f0f6ff;
      text-align: center;
      margin-bottom: 4px;
    }

    .login-subtitle {
      font-size: .85rem; color: var(--txt-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-label {
      color: var(--txt-soft);
      font-size: .82rem; font-weight: 500;
      margin-bottom: 6px;
    }

    .form-control {
      background: var(--bg-3);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      color: var(--txt);
      padding: 10px 14px;
      font-size: .9rem;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      background: var(--bg-3);
      border-color: var(--gold);
      color: var(--txt);
      box-shadow: 0 0 0 3px rgba(245,184,75,.18);
      outline: none;
    }
    .form-control::placeholder { color: var(--txt-muted); }

    .btn-login {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      background: var(--gold); color: #000;
      border: none; border-radius: 11px;
      padding: 12px;
      font-weight: 700; font-size: .95rem;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s, transform .15s;
    }
    .btn-login:hover { opacity: .88; transform: translateY(-1px); }

    .flash-area { margin-bottom: 20px; }
    .flash-msg {
      padding: 10px 14px;
      border-radius: 9px;
      font-size: .84rem;
      margin-bottom: 8px;
    }
    .flash-danger  { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3);  color: #f9a8a8; }
    .flash-success { background: rgba(61,213,165,.12); border: 1px solid rgba(61,213,165,.3); color: #7ee8cb; }
    .flash-warning { background: rgba(245,184,75,.12); border: 1px solid rgba(245,184,75,.3); color: #f8d07a; }
    .flash-info    { background: rgba(108,142,247,.12); border: 1px solid rgba(108,142,247,.3); color: #a5b8f8; }

    .invalid-feedback { color: #f9a8a8; font-size: .78rem; margin-top: 4px; }
    .was-validated .form-control:invalid { border-color: rgba(239,68,68,.6); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">EP</div>
    <div class="login-title">EmbyPanel</div>
    <div class="login-subtitle">Accedi al tuo account</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-area">
          {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label">
          <i class="fa-solid fa-user me-1"></i> Username
        </label>
        <input type="text" class="form-control" id="username" name="username"
               placeholder="Inserisci username" required autocomplete="username">
        <div class="invalid-feedback">Inserisci il tuo username.</div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">
          <i class="fa-solid fa-lock me-1"></i> Password
        </label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Inserisci password" required autocomplete="current-password">
        <div class="invalid-feedback">Inserisci la tua password.</div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Accedi
      </button>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    'use strict';
    document.querySelectorAll('form').forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) { event.preventDefault(); event.stopPropagation(); }
        form.classList.add('was-validated');
      }, false);
    });
  })();
</script>
</body>
</html>
