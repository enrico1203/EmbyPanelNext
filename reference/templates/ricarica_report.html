{% extends "basev5.html" %}
{% block title %}Report Ricarica Subseller{% endblock %}

{% block content %}
<div class="pg">
  <div style="max-width:700px; margin:0 auto;">
    <div class="pg-title" style="margin-bottom:20px;">Report Ricarica Subseller</div>

    <div style="background:var(--bg-2); border:1px solid var(--border); border-radius:18px; padding:24px 28px; margin-bottom:20px;">
      <!-- Il report_message contiene già il markup HTML della card -->
      {{ report_message | safe }}
    </div>

    <a href="{{ url_for('subseller_detail', idtelegram=idtelegram) }}" class="pg-back">
      <i class="fa-solid fa-arrow-left fa-sm"></i> Torna a Dettagli Subseller
    </a>
  </div>
</div>
{% endblock %}
